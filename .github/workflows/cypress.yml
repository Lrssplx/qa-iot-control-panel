name: QA Automation Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  E2E-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install: true
          runTests: true